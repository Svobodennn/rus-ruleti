# electron-builder config — Sprint 0 Phase 2 (@devops).
#
# Targets:
#   - macOS DMG (Intel + Apple Silicon → universal binary handled at build time
#     by --arch flags or a top-level matrix; here we just declare the dmg target).
#   - Windows NSIS installer with consent screen (oneClick: false per PLAN section 6
#     — joke app MUST surface a disclaimer on install).
#
# Signing/notarization:
#   - Placeholders only. Real certs + notarization stretch to Sprint 7/8 (Mac polish,
#     Win polish) once the team has Apple Developer ID + Windows code-signing cert.
#   - hardenedRuntime: true now so we don't have to rebuild later when notarization arrives.
#   - gatekeeperAssess: false because we don't run `spctl --assess` in CI yet.
#
# Crash dumps / logs:
#   - electron-log writes to ~/Library/Logs/Rus Ruleti/ (mac) or %APPDATA%/Rus Ruleti/logs/ (win).
#     Both resolved at runtime via app.getPath('userData') — NOT bundled into the package.
#   - crashReporter dumps go to userData/crashes — also runtime-only, NOT shipped.
#   - submitURL is intentionally blank (see src/main/index.ts comment + PLAN section 14).

appId: app.famelink.rusruleti
productName: Rus Ruleti
copyright: Copyright (C) 2026 famelink

directories:
  output: dist
  buildResources: resources

# What goes into the asar archive shipped to users.
# - out/**/* is the electron-vite build output (main, preload, renderer bundles).
# - package.json is required by electron at runtime.
# - LICENSE/LEGAL/README will live at repo root once Sprint 9 docs land; include
#   them eagerly so we don't forget on release day.
# Exclude source maps from production (they leak source paths AND bloat the DMG;
# kept for dev via electron-vite sourcemap:true but stripped from packaged build).
files:
  - out/**/*
  - package.json
  - LICENSE*
  - LEGAL*
  - README*
  - '!**/*.map'
  - '!**/*.ts'
  - '!**/*.tsx'
  - '!**/__tests__/**'
  - '!**/__specs__/**'
  - '!**/*.test.*'
  - '!**/*.spec.*'

# Node modules pruning — electron-builder already prunes devDependencies, but
# explicitly excluding common dev cruft keeps the asar tight.
asarUnpack: []

extraResources: []

# -----------------------------------------------------------------------------
# macOS
# -----------------------------------------------------------------------------
mac:
  # Sprint 9 extension: ADD zip target alongside DMG (second distributable
  # format per release directive). Both archs (x64 + arm64) for each target;
  # x64 cross-build may be deferred if harness blocks (release-checklist.md
  # documents the escape hatch).
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.entertainment
  # hardenedRuntime: required for notarization (Sprint 7). Setting it now means
  # the entitlements file is the only thing we add later.
  hardenedRuntime: true
  # gatekeeperAssess: false — we don't run spctl in CI. README will document the
  # `xattr -dr com.apple.quarantine` workaround for unsigned local installs
  # (PLAN section 12 risk row).
  gatekeeperAssess: false
  # Signing placeholders. Empty identity = "don't sign" so local dev builds work.
  # Sprint 9 keeps identity:null; CSC_LINK / CSC_KEY_PASSWORD / CSC_NAME env
  # vars override at build time (see build/CODE-SIGNING.md §1).
  identity: null
  # Notarization placeholder — populated at build time via Notary API env vars
  # (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER) OR legacy app-specific
  # password (APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD). See build/CODE-SIGNING.md §1.
  notarize: false
  # Sprint 9: entitlements wired (Sprint 0 placeholder uncommented). Plist
  # requests ONLY Hardened-Runtime entitlements Electron requires (JIT,
  # unsigned executable memory, DYLD env vars, disable library validation).
  # See build/entitlements.mac.plist for full rationale + the deliberate
  # OMISSION of camera/microphone/network/files entitlements (joke app — zero
  # real system access per PLAN §6 + LEGAL.md).
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  # DMG title shown in Finder when mounted. Latin-only to avoid Finder quirks
  # with Cyrillic in the volume label.
  title: Rus Ruleti ${version}
  # Single-window installer layout. Real icon work lands Sprint 7.
  iconSize: 96

# -----------------------------------------------------------------------------
# Windows
# -----------------------------------------------------------------------------
win:
  # Sprint 9 extension: ADD msi target alongside NSIS. NSIS retained as fallback
  # installer for users blocked by MSI corporate policy (some IT environments
  # whitelist MSI only; others whitelist signed NSIS only — shipping both
  # maximizes deployability for the joke-app's distribution surface).
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  # Sprint 9: SHA-256 only (SHA-1 deprecated for code signing). Cert env vars
  # (CSC_LINK / CSC_KEY_PASSWORD or WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD) are
  # populated at build time via the maintainer's secret manager — see
  # build/CODE-SIGNING.md §2.
  signingHashAlgorithms:
    - sha256
  # RFC 3161 timestamping — REQUIRED for trust beyond cert expiry. Without
  # timestamping, signatures stop validating once the signing cert expires
  # (typically 1-3 years from issuance). DigiCert is the default; swap to
  # Sectigo/GlobalSign/Comodo if rate-limited (see build/CODE-SIGNING.md §2.4).
  rfc3161TimeStampServer: http://timestamp.digicert.com
  timeStampServer: http://timestamp.digicert.com

nsis:
  # oneClick: false REQUIRED by PLAN section 6 — joke app must present a consent
  # screen on install so the victim has a paper trail of "yes I asked for this".
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Keep the legal disclaimer surfaced in the installer chrome. Sprint 9 wires
  # the actual license/disclaimer file via license path once technical-writer
  # finalises LEGAL.md.
  # license: LEGAL.md
  deleteAppDataOnUninstall: true
  # Run the app after install with the consent dialog already shown.
  runAfterFinish: false
  # Installer artifact name. Default electron-builder template is fine; pin
  # explicit name so CI doesn't surprise us with version-string drift.
  artifactName: ${productName} Setup ${version}.${ext}

# -----------------------------------------------------------------------------
# Linux (Sprint 9 NEW — AppImage + .deb x64)
# -----------------------------------------------------------------------------
# AppImage: single-file portable; works on most Linux desktops without install.
# .deb: native Debian/Ubuntu package; preferred for `apt install` workflows.
# .deb cross-build from macOS may require `fpm` toolchain; AppImage-only ship
# is the documented escape hatch (see scripts/release-checklist.md).
# Category: Game (FreeDesktop spec — appears under Games in launchers).
# Icon: build/icon.png (512x512 designer original — Sprint 9 Phase 2A spec).
# Code signing: AppImage doesn't require signing per Linux convention;
# optional GPG signing flow documented in build/CODE-SIGNING.md §3.
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Game
  icon: build/icon.png

# -----------------------------------------------------------------------------
# Publishing
# -----------------------------------------------------------------------------
# No auto-publish. PLAN section 14: GitHub Releases manual (private + disclaimer).
publish: null
