<?xml version="1.0" encoding="UTF-8"?>
<!--
  Rus Ruleti — NSIS Modern UI 2 widescreen welcome panel (Sprint 9 release art)
  497x312 BMP target. Sodium vertical bar + title + italic disclaimer subtitle.
  See destruction-direction.md §26.5.
  Lane A Phase 2B rasterizes to build/nsis-banner.bmp.
  NO app icon in banner — deliberate omission per §26.5; consent screen focuses on text disclaimer.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 497 312"
     width="497" height="312">
  <!-- Full black field -->
  <rect x="0" y="0" width="497" height="312" fill="#000000"/>

  <!-- Sodium-yellow vertical bar on left edge — 40px wide, full height 312px -->
  <!-- References Sprint 6 BSOD blue-bar visual vocabulary but inverted to sodium
       (calm-before-storm color, not catastrophe color) -->
  <rect x="0" y="0" width="40" height="312" fill="#FFC75E"/>

  <!-- Title "Rus Ruleti" — Old Standard TT regular @ 32pt, x=70 (just right of bar+gap), y=80 -->
  <text x="70" y="80"
        font-family="'Old Standard TT', 'PT Serif', Georgia, serif"
        font-size="32"
        font-weight="400"
        fill="#FFC75E">Rus Ruleti</text>

  <!-- Disclaimer subtitle — PT Serif italic @ 11pt, 80% opacity, x=70, y=260 -->
  <!-- Italic = typographer's parenthetical / side-note voice;
       80% opacity demotes to "present but quiet" — primary action owned by NSIS chrome below -->
  <text x="70" y="260"
        font-family="'PT Serif', Georgia, serif"
        font-size="11"
        font-style="italic"
        font-weight="400"
        fill="#FFC75E"
        fill-opacity="0.8">Şaka uygulaması — kurulum öncesi LEGAL.md okuyun.</text>
</svg>
